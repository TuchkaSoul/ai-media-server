<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaFlow - Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .login-title {
            color: #2c3e50;
            font-weight: 700;
        }
        
        .form-control {
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #007acc;
            box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.1);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #007acc, #0056b3);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 204, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="login-container p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-video fa-3x text-primary mb-3"></i>
                        <h2 class="login-title">MediaFlow</h2>
                        <p class="text-muted">Интеллектуальная система хранения медиаданных</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">👤 Имя пользователя</label>
                            <input type="text" class="form-control" placeholder="Введите имя пользователя" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">🔒 Пароль</label>
                            <input type="password" class="form-control" placeholder="Введите пароль" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">🌐 Сервер</label>
                            <select class="form-select">
                                <option>Основной сервер</option>
                                <option>Резервный сервер</option>
                                <option>Локальный сервер</option>
                            </select>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-login text-white">
                                <span class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
                                Войти в систему
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-cancel">Отмена</button>
                        </div>
                    </form>
                    
                    <div class="progress mt-3 d-none">
                        <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                    
                    <div class="text-center mt-3">
                        <small class="text-muted" id="loginStatus">Готов к подключению...</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        class LoginManager {
            constructor() {
                this.init();
            }

            init() {
                this.setupEventListeners();
            }

            setupEventListeners() {
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();
                });

                document.querySelector('.btn-cancel').addEventListener('click', () => {
                    if (confirm('Вы уверены, что хотите отменить вход?')) {
                        window.close();
                    }
                });
            }

            async handleLogin() {
                const form = document.getElementById('loginForm');
                const submitBtn = form.querySelector('button[type="submit"]');
                const spinner = submitBtn.querySelector('.spinner-border');
                const progress = document.querySelector('.progress');
                const status = document.getElementById('loginStatus');

                // Show loading state
                submitBtn.disabled = true;
                spinner.classList.remove('d-none');
                progress.classList.remove('d-none');
                status.textContent = 'Подключение к серверу...';

                try {
                    // Simulate login process
                    for (let i = 0; i <= 100; i += 2) {
                        await this.delay(50);
                        document.querySelector('.progress-bar').style.width = `${i}%`;
                        
                        if (i === 40) status.textContent = 'Аутентификация...';
                        if (i === 70) status.textContent = 'Загрузка данных...';
                        if (i === 90) status.textContent = 'Инициализация системы...';
                    }

                    // Login successful - redirect to main app
                    status.textContent = '✅ Успешный вход! Перенаправление...';
                    await this.delay(1000);
                    
                    // Redirect to main application
                    window.location.href = 'main.html';

                } catch (error) {
                    status.textContent = '❌ Ошибка подключения к серверу';
                    console.error('Login error:', error);
                } finally {
                    submitBtn.disabled = false;
                    spinner.classList.add('d-none');
                }
            }

            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // Initialize login manager
        new LoginManager();
    </script>
</body> 
</html>
