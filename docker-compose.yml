services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: api
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VECTOR_DB_URL: http://qdrant:6333
      STORAGE_PATH: /storage
      LOG_LEVEL: INFO
      LOG_FALLBACK_FILE: /tmp/api-errors.log
    ports:
      - "8000:8000"
    volumes:
      - ./storage/videos:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      loki:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: worker
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VECTOR_DB_URL: http://qdrant:6333
      STORAGE_PATH: /storage
      LOG_LEVEL: INFO
      LOG_FALLBACK_FILE: /tmp/worker-errors.log
    command: celery -A worker.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./storage/videos:/storage
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      loki:
        condition: service_started

  video_stream:
    build:
      context: .
      dockerfile: services/video_stream/Dockerfile
    container_name: video_stream
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      VIDEO_STREAM_PUSH_METADATA: "true"
      VIDEO_STREAM_METADATA_QUEUE: video:frames:metadata
      VIDEO_STREAM_AUTO_DISCOVER_USB: "false"
      LOG_LEVEL: INFO
      LOG_FALLBACK_FILE: /tmp/video-stream-errors.log
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      loki:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./configs/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  loki_data:
  grafana_data:
